name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure pnpm
        uses: pnpm/action-setup@v6

      - name: Configure Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run application quality
        run: pnpm run check

      - name: Start local database
        run: pnpm run db:start

      - name: Reset local database
        run: pnpm run db:reset

      - name: Lint local database
        run: pnpm run db:lint

      - name: Run database tests
        run: pnpm run test:db

      - name: Stop local database
        if: always()
        run: pnpm run db:stop
